<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preston Collection — Family Access</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#000;color:#e8e8e8;font-family:Montserrat,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#111;border:1px solid #2a2a2a;padding:48px;max-width:420px;width:100%;}
h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:8px;}
p{color:#888;font-size:13px;margin-bottom:32px;}
input{width:100%;background:#000;border:1px solid #2a2a2a;color:#e8e8e8;padding:12px;font-size:14px;margin-bottom:16px;box-sizing:border-box;outline:none;}
input:focus{border-color:#b8972a;}
button{width:100%;background:#c0392b;color:#fff;border:none;padding:14px;font-size:12px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;}
.msg{margin-top:16px;font-size:12px;text-align:center;color:#b8972a;}
.err{color:#e74c3c;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<div class="box">
  <h1>Preston Collection</h1>
  <p>Family Member Access — Sign in below</p>
  <div id="msg"></div>
  <input type="email" id="email" placeholder="Email address">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Sign In to Collection</button>
  <div class="msg" style="margin-top:24px;font-size:11px;color:#444;">
    <a href="#" onclick="showReset()" style="color:#b8972a;">Forgot password?</a> &nbsp;|&nbsp; 
    <a href="https://prestoncollection.net" style="color:#666;">← Public Site</a>
  </div>
</div>
<script>
const sb = supabase.createClient(
  'https://witvlkcjvzxxajdwzdep.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpdHZsa2Nqdnp4eGFqZHd6ZGVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTk0MDIsImV4cCI6MjA4OTAzNTQwMn0.miKL5P-oTz4r1eTE4mCVdr9nbPv43aAzQQ2fREG1PVc'
);

async function login() {
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  msg.innerHTML = '<span style="color:#888">Signing in...</span>';
  const {data, error} = await sb.auth.signInWithPassword({email, password: pwd});
  if (error) { msg.innerHTML = '<span class="err">' + error.message + '</span>'; return; }
  const {data: profile} = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  if (profile?.access_level === 'admin') {
    window.location.href = 'https://jeffhpreston-web.github.io/preston-family-portal/admin.html';
  } else if (['full_member','view_only','contributor'].includes(profile?.access_level)) {
    msg.innerHTML = '<span style="color:#b8972a">Welcome, ' + (profile.full_name || email) + '! Portal loading...</span>';
  } else {
    msg.innerHTML = '<span style="color:#888">Your application is pending review.</span>';
  }
}

async function showReset() {
  const email = prompt('Enter your email address for a password reset link:');
  if (!email) return;
  const {error} = await sb.auth.resetPasswordForEmail(email, {redirectTo: window.location.href});
  alert(error ? error.message : 'Reset link sent! Check your email.');
}
</script>
</body>
</html>
